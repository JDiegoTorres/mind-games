<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>🧩 Crucigrama - Mind Games</title>
        <link rel="stylesheet" href="../../css/styles.css" />
        <link rel="stylesheet" href="crossword.css" />
    </head>
    <body>
        <header class="header">
            <a href="../../index.html" class="back-link">← Volver</a>
            <h1><span class="game-title-icon">🧩</span> Crucigrama</h1>
            <p class="theme-label">Temática: <span id="theme-display">---</span></p>
        </header>

        <section class="game-controls">
            <button class="btn-action" id="btn-check">✔️ Comprobar</button>
            <button class="btn-action" id="btn-reveal">💡 Revelar palabra</button>
            <button class="btn-action" id="btn-new">🔄 Nuevo crucigrama</button>
        </section>

        <main class="crossword-layout">
            <section class="crossword-grid-container">
                <div class="crossword-grid" id="crossword-grid">
                    <!-- La cuadrícula se genera con JavaScript -->
                </div>
            </section>

            <section class="crossword-clues">
                <div class="clues-group">
                    <h3>Horizontales</h3>
                    <ul class="clues-list" id="clues-horizontal"></ul>
                </div>
                <div class="clues-group">
                    <h3>Verticales</h3>
                    <ul class="clues-list" id="clues-vertical"></ul>
                </div>
            </section>
        </main>

        <div class="win-message" id="win-message" hidden>
            <h2>🎉 ¡Crucigrama completado!</h2>
            <p>Has resuelto el crucigrama de <span id="win-theme">---</span></p>
            <p class="score-display">Puntuación: <span id="win-score">0</span></p>
            <button class="btn-action" id="btn-play-again">Jugar otro</button>
        </div>

        <script src="../../js/scoring.js"></script>
        <script src="puzzles.js"></script>
        <script src="crossword.js"></script>
    </body>
</html>
