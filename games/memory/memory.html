<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>🃏 Memory - Mind Games</title>
        <link rel="stylesheet" href="../../css/styles.css" />
        <link rel="stylesheet" href="memory.css" />
    </head>
    <body>
        <header class="header">
            <a href="../../index.html" class="back-link">← Volver</a>
            <h1><span class="game-title-icon">🃏</span> Memory</h1>
            <p>Encuentra todas las parejas de cartas</p>
        </header>

        <section class="game-info">
            <div class="stat">
                <span class="stat-label">Movimientos</span>
                <span class="stat-value" id="moves-count">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Parejas</span>
                <span class="stat-value" id="pairs-count">0/6</span>
            </div>
            <button class="btn-restart" id="btn-restart">🔄 Reiniciar</button>
        </section>

        <section class="memory-board" id="memory-board">
            <!-- Las cartas se generan con JavaScript -->
        </section>

        <div class="win-message" id="win-message" hidden>
            <h2>🎉 ¡Ganaste!</h2>
            <p>Completaste el juego en <span id="final-moves">0</span> movimientos</p>
            <p class="score-display">Puntuación: <span id="final-score">0</span></p>
            <button class="btn-restart" id="btn-play-again">Jugar de nuevo</button>
        </div>

        <script src="../../js/scoring.js"></script>
        <script src="memory.js"></script>
    </body>
</html>
