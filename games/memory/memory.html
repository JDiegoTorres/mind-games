<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🃏 Memory - Mind Games</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="memory.css">
</head>
<body>
    <header class="header">
        <a href="../../index.html" class="back-link">← Volver</a>
        <h1>🃏 Memory</h1>
        <p>Encuentra todas las parejas de cartas</p>
    </header>

    <section class="game-info">
        <div class="stat">
            <span class="stat-label">Movimientos</span>
            <span class="stat-value" id="moves-count">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">Parejas</span>
            <span class="stat-value" id="pairs-count">0/6</span>
        </div>
        <button class="btn-restart" id="btn-restart">🔄 Reiniciar</button>
    </section>

    <section class="memory-board" id="memory-board">
        <!-- Las cartas se generan con JavaScript -->
    </section>

    <div class="win-message" id="win-message" hidden>
        <h2>🎉 ¡Ganaste!</h2>
        <p>Completaste el juego en <span id="final-moves">0</span> movimientos</p>
        <p class="score-display">Puntuación: <span id="final-score">0</span></p>
        <button class="btn-restart" id="btn-play-again">Jugar de nuevo</button>
    </div>

    <script src="../../js/scoring.js"></script>
    <script>
    // Si scoring.js no cargó (file:// protocol), definir funciones localmente
    if (typeof saveScore === 'undefined') {
        const SCORES_KEY = 'mindgames_scores';
        const PLAYER_KEY = 'mindgames_player';
        function getPlayerName() { return localStorage.getItem(PLAYER_KEY); }
        function saveScore(gameName, score, category, difficulty) {
            const scores = JSON.parse(localStorage.getItem(SCORES_KEY) || '[]');
            scores.push({ player: getPlayerName() || 'Anon', game: gameName, score: Math.max(score, 100), category, difficulty, date: new Date().toISOString() });
            localStorage.setItem(SCORES_KEY, JSON.stringify(scores.slice(-50)));
        }
        function calculateMemoryScore(moves) { return Math.max(1000 - (moves * 50), 100); }
    }
    </script>
    <script src="memory.js"></script>
</body>
</html>
